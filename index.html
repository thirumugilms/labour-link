<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Labour Link</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
  <script type="text/javascript">
    function googleTranslateElementInit() {
      new google.translate.TranslateElement({
        pageLanguage: 'en',
        autoDisplay: false
      }, 'google_translate_hidden_engine');
    }

    // ⚡ FIXED EVENT BRIDGE: Uses legacy events framework matching Google\'s architecture
    function triggerLanguageTranslation(langCode) {
      const googleSelect = document.querySelector('.goog-te-combo');
      if (googleSelect) {
        googleSelect.value = langCode;
        
        // Create and dispatch an explicit legacy HTML change event
        if (document.createEvent) {
          var event = document.createEvent('HTMLEvents');
          event.initEvent('change', true, true);
          googleSelect.dispatchEvent(event);
        } else {
          // Fallback option for older browser layouts
          googleSelect.fireEvent('onchange');
        }
      } else {
        console.warn("Translation engine initializing... Please try again in a moment.");
      }
    }
  </script>
  <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</html>
